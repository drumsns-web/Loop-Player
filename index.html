<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;700;900&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --accent: #ff3c00;
    --accent2: #ffcc00;
    --text: #f0f0f0;
    --muted: #555;
    --border: #2a2a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  header span {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  /* DROP ZONE */
  #dropZone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px 20px;
    cursor: pointer;
  }

  #dropZone .icon {
    width: 80px;
    height: 80px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,60,0,0.3); }
    50% { box-shadow: 0 0 0 12px rgba(255,60,0,0); }
  }

  #dropZone .icon svg { width: 32px; height: 32px; fill: var(--accent); }

  #dropZone p {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  #dropZone p strong { color: var(--text); font-weight: 700; }

  #fileInput { display: none; }

  /* PLAYER LAYOUT */
  #playerArea {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  #playerArea.active { display: flex; }

  /* VIDEO */
  #videoWrap {
    background: #000;
    position: relative;
    flex-shrink: 0;
    max-height: 45dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  video {
    width: 100%;
    max-height: 45dvh;
    object-fit: contain;
    display: block;
  }

  /* AB badge */
  #abBadge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--accent2);
    color: #000;
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 3px;
    display: none;
    letter-spacing: 0.1em;
  }

  /* CONTROLS SCROLL AREA */
  #controls {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px 30px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
  }

  /* SEEK BAR */
  .seekRow {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .timeDisp {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .seekWrap {
    position: relative;
    height: 28px;
    display: flex;
    align-items: center;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,60,0,0.5);
  }

  #seekBar {
    background: linear-gradient(to right, var(--accent) 0%, var(--border) 0%);
  }

  /* AB markers on seek */
  #abA, #abB {
    position: absolute;
    top: 50%;
    transform: translateX(-50%) translateY(-50%);
    width: 3px;
    height: 16px;
    border-radius: 1px;
    pointer-events: none;
    display: none;
  }
  #abA { background: var(--accent2); }
  #abB { background: #00ccff; }

  /* PLAYBACK CONTROLS */
  .playRow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn:active { background: var(--surface); }

  .btn.icon-btn {
    width: 44px;
    height: 44px;
  }

  .btn.icon-btn svg { width: 20px; height: 20px; fill: var(--text); }

  .playBtn {
    width: 64px !important;
    height: 64px !important;
    border-radius: 50% !important;
    border-color: var(--accent) !important;
    background: var(--accent) !important;
  }

  .playBtn svg { fill: #fff !important; width: 26px !important; height: 26px !important; }
  .playBtn:active { background: #cc2f00 !important; }

  .btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.active svg { fill: #fff; }

  /* SECTION LABEL */
  .sectionLabel {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  /* SPEED */
  .speedSection { display: flex; flex-direction: column; gap: 8px; }

  .speedPresets {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }

  .speedBtn {
    height: 36px;
    border-radius: 5px;
    font-size: 10px;
    letter-spacing: 0;
    padding: 0;
  }

  .speedBtn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #000;
  }

  .speedSliderRow {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .speedSliderRow label {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 30px;
  }

  #speedVal {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--accent2);
    min-width: 38px;
    text-align: right;
  }

  #speedSlider {
    flex: 1;
    background: linear-gradient(to right, var(--accent2) 0%, var(--border) 0%);
  }

  #speedSlider::-webkit-slider-thumb {
    background: var(--accent2);
    box-shadow: 0 0 8px rgba(255,204,0,0.5);
  }

  /* AB SECTION */
  .abSection { display: flex; flex-direction: column; gap: 8px; }

  .abRow {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .abPointBtn {
    flex: 1;
    height: 38px;
    font-size: 10px;
    letter-spacing: 0.05em;
    min-width: 80px;
  }

  .abPointBtn.set-a { border-color: var(--accent2); color: var(--accent2); }
  .abPointBtn.set-b { border-color: #00ccff; color: #00ccff; }
  .abPointBtn.set-a.active { background: var(--accent2); color: #000; }
  .abPointBtn.set-b.active { background: #00ccff; color: #000; }

  .abInfo {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  #abInfo { font-size: 10px; color: var(--muted); }

  /* LOOP */
  .loopRow {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .loopToggle {
    width: 52px;
    height: 30px;
    border-radius: 15px;
    border: 1px solid var(--border);
    background: var(--surface2);
    position: relative;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }

  .loopToggle.active {
    background: var(--accent);
    border-color: var(--accent);
  }

  .loopToggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }

  .loopToggle.active::after { transform: translateX(22px); }

  .loopLabel { font-size: 11px; color: var(--text); }
  .loopLabel span { color: var(--muted); font-size: 10px; }

  /* FILE CHANGE */
  .changeFileBtn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 8px 14px;
    border-radius: 5px;
    cursor: pointer;
    letter-spacing: 0.08em;
    align-self: center;
  }

  .changeFileBtn:active { background: var(--surface2); }

  /* FRAME STEP */
  .frameRow {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .frameBtn {
    flex: 1;
    height: 38px;
    font-size: 10px;
    gap: 4px;
  }

  .frameBtn svg { width: 14px; height: 14px; fill: var(--text); }

</style>
</head>
<body>

<header>
  <h1>LOOP PLAYER</h1>
  <span>VIDEO SPEED &amp; LOOP TOOL</span>
</header>

<!-- DROP ZONE -->
<div id="dropZone">
  <div class="icon">
    <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
  </div>
  <p><strong>動画を選択</strong><br>カメラロールから動画を<br>読み込めます</p>
  <input type="file" id="fileInput" accept="video/*">
</div>

<!-- PLAYER -->
<div id="playerArea">

  <div id="videoWrap">
    <video id="video" playsinline webkit-playsinline></video>
    <div id="abBadge">A-B LOOP</div>
  </div>

  <div id="controls">

    <!-- SEEK -->
    <div class="seekRow">
      <div class="timeDisp">
        <span id="currentTime">0:00.0</span>
        <span id="duration">0:00.0</span>
      </div>
      <div class="seekWrap">
        <input type="range" id="seekBar" min="0" max="1000" value="0" step="1">
        <div id="abA"></div>
        <div id="abB"></div>
      </div>
    </div>

    <!-- PLAYBACK -->
    <div class="playRow">
      <button class="btn icon-btn" id="skipBackBtn" title="-5秒">
        <svg viewBox="0 0 24 24"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/><text x="8" y="14" font-size="5" fill="currentColor" font-family="monospace">5</text></svg>
      </button>
      <button class="btn icon-btn" id="frameBackBtn" title="1フレーム戻る">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="btn icon-btn playBtn" id="playBtn">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="btn icon-btn" id="frameForwardBtn" title="1フレーム進む">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.5 3.86-5.5 3.86V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <button class="btn icon-btn" id="skipForwardBtn" title="+5秒">
        <svg viewBox="0 0 24 24"><path d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"/><text x="9" y="14" font-size="5" fill="currentColor" font-family="monospace">5</text></svg>
      </button>
    </div>

    <!-- LOOP -->
    <div class="sectionLabel">LOOP</div>
    <div class="loopRow">
      <div class="loopToggle active" id="loopToggle"></div>
      <div class="loopLabel">ループ再生 <span>全体をくり返す</span></div>
    </div>

    <!-- SPEED -->
    <div class="sectionLabel">SPEED</div>
    <div class="speedSection">
      <div class="speedPresets">
        <button class="btn speedBtn" data-speed="0.25">0.25×</button>
        <button class="btn speedBtn" data-speed="0.5">0.5×</button>
        <button class="btn speedBtn" data-speed="0.75">0.75×</button>
        <button class="btn speedBtn active" data-speed="1">1×</button>
        <button class="btn speedBtn" data-speed="1.5">1.5×</button>
        <button class="btn speedBtn" data-speed="2">2×</button>
        <button class="btn speedBtn" data-speed="4">4×</button>
      </div>
      <div class="speedSliderRow">
        <label>速度</label>
        <input type="range" id="speedSlider" min="10" max="400" value="100" step="5">
        <span id="speedVal">1.00×</span>
      </div>
    </div>

    <!-- A-B LOOP -->
    <div class="sectionLabel">A-B LOOP</div>
    <div class="abSection">
      <div class="abRow">
        <button class="btn abPointBtn set-a" id="setABtn">A 点をセット</button>
        <button class="btn abPointBtn set-b" id="setBBtn">B 点をセット</button>
        <button class="btn icon-btn" id="clearAbBtn" title="A-Bクリア" style="width:38px;height:38px;">
          <svg viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="abInfo" class="abInfo">A-B ループなし</div>
    </div>

    <button class="changeFileBtn" id="changeFileBtn">📂 別の動画を開く</button>

  </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const playerArea = document.getElementById('playerArea');
const video = document.getElementById('video');
const seekBar = document.getElementById('seekBar');
const currentTimeEl = document.getElementById('currentTime');
const durationEl = document.getElementById('duration');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const loopToggle = document.getElementById('loopToggle');
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
const abBadge = document.getElementById('abBadge');
const abInfo = document.getElementById('abInfo');
const abAEl = document.getElementById('abA');
const abBEl = document.getElementById('abB');
const setABtn = document.getElementById('setABtn');
const setBBtn = document.getElementById('setBBtn');
const clearAbBtn = document.getElementById('clearAbBtn');
const changeFileBtn = document.getElementById('changeFileBtn');

let isLooping = true;
let abA = null;
let abB = null;
let seeking = false;
let abInterval = null;

// SVGs
const playSVG = `<path d="M8 5v14l11-7z"/>`;
const pauseSVG = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;

function fmtTime(s) {
  if (isNaN(s)) return '0:00.0';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  const dec = Math.floor((s % 1) * 10);
  return `${m}:${sec.toString().padStart(2,'0')}.${dec}`;
}

// File open
dropZone.addEventListener('click', () => fileInput.click());
changeFileBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  video.src = url;
  video.load();
  dropZone.style.display = 'none';
  playerArea.classList.add('active');
  abA = null; abB = null;
  updateAbUI();
});

// Video events
video.addEventListener('loadedmetadata', () => {
  durationEl.textContent = fmtTime(video.duration);
  seekBar.value = 0;
  updateSeekBg(seekBar);
  updateAbMarkers();
});

video.addEventListener('timeupdate', () => {
  if (seeking) return;
  const pct = video.duration ? video.currentTime / video.duration : 0;
  seekBar.value = Math.round(pct * 1000);
  currentTimeEl.textContent = fmtTime(video.currentTime);
  updateSeekBg(seekBar);

  // AB loop check
  if (abA !== null && abB !== null && video.currentTime >= abB) {
    video.currentTime = abA;
  }
});

video.addEventListener('play', () => {
  playIcon.innerHTML = pauseSVG;
});
video.addEventListener('pause', () => {
  playIcon.innerHTML = playSVG;
});
video.addEventListener('ended', () => {
  if (isLooping && (abA === null || abB === null)) {
    video.currentTime = 0;
    video.play();
  }
  playIcon.innerHTML = playSVG;
});

// Play/pause
playBtn.addEventListener('click', () => {
  if (video.paused) {
    video.play().catch(()=>{});
  } else {
    video.pause();
  }
});

// Seek
seekBar.addEventListener('input', () => {
  seeking = true;
  const t = (seekBar.value / 1000) * video.duration;
  video.currentTime = t;
  currentTimeEl.textContent = fmtTime(t);
  updateSeekBg(seekBar);
});
seekBar.addEventListener('change', () => { seeking = false; });

// Skip
document.getElementById('skipBackBtn').addEventListener('click', () => {
  video.currentTime = Math.max(0, video.currentTime - 5);
});
document.getElementById('skipForwardBtn').addEventListener('click', () => {
  video.currentTime = Math.min(video.duration, video.currentTime + 5);
});

// Frame step (≈1/30s)
document.getElementById('frameBackBtn').addEventListener('click', () => {
  video.pause();
  video.currentTime = Math.max(0, video.currentTime - 1/30);
});
document.getElementById('frameForwardBtn').addEventListener('click', () => {
  video.pause();
  video.currentTime = Math.min(video.duration, video.currentTime + 1/30);
});

// Loop toggle
loopToggle.addEventListener('click', () => {
  isLooping = !isLooping;
  loopToggle.classList.toggle('active', isLooping);
  video.loop = isLooping && (abA === null || abB === null);
});

// Speed presets
document.querySelectorAll('.speedBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const speed = parseFloat(btn.dataset.speed);
    setSpeed(speed);
  });
});

// Speed slider
speedSlider.addEventListener('input', () => {
  const speed = speedSlider.value / 100;
  setSpeed(speed, false);
  updateSeekBg(speedSlider);
});

function setSpeed(speed, updateSlider = true) {
  video.playbackRate = speed;
  speedVal.textContent = speed.toFixed(2) + '×';
  if (updateSlider) {
    speedSlider.value = Math.round(speed * 100);
    updateSeekBg(speedSlider);
  }
  document.querySelectorAll('.speedBtn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.dataset.speed) === speed);
  });
}

// A-B
setABtn.addEventListener('click', () => {
  abA = video.currentTime;
  setABtn.classList.add('active');
  setABtn.textContent = 'A: ' + fmtTime(abA);
  if (abB !== null && abB <= abA) { abB = null; setBBtn.classList.remove('active'); setBBtn.textContent = 'B 点をセット'; }
  updateAbUI();
  updateAbMarkers();
});

setBBtn.addEventListener('click', () => {
  if (abA === null) { alert('先にA点をセットしてください'); return; }
  const t = video.currentTime;
  if (t <= abA) { alert('B点はA点より後にしてください'); return; }
  abB = t;
  setBBtn.classList.add('active');
  setBBtn.textContent = 'B: ' + fmtTime(abB);
  updateAbUI();
  updateAbMarkers();
  video.currentTime = abA;
  if (video.paused) video.play().catch(()=>{});
});

clearAbBtn.addEventListener('click', () => {
  abA = null; abB = null;
  setABtn.classList.remove('active'); setABtn.textContent = 'A 点をセット';
  setBBtn.classList.remove('active'); setBBtn.textContent = 'B 点をセット';
  updateAbUI();
  updateAbMarkers();
});

function updateAbUI() {
  const active = abA !== null && abB !== null;
  abBadge.style.display = active ? 'block' : 'none';
  video.loop = isLooping && !active;
  if (active) {
    abInfo.textContent = `A: ${fmtTime(abA)} → B: ${fmtTime(abB)} (${fmtTime(abB - abA)})`;
  } else if (abA !== null) {
    abInfo.textContent = `A: ${fmtTime(abA)} — B点を待機中`;
  } else {
    abInfo.textContent = 'A-B ループなし';
  }
}

function updateAbMarkers() {
  if (!video.duration) return;
  const dur = video.duration;
  if (abA !== null) {
    abAEl.style.display = 'block';
    abAEl.style.left = (abA / dur * 100) + '%';
  } else {
    abAEl.style.display = 'none';
  }
  if (abB !== null) {
    abBEl.style.display = 'block';
    abBEl.style.left = (abB / dur * 100) + '%';
  } else {
    abBEl.style.display = 'none';
  }
}

function updateSeekBg(el) {
  const pct = (el.value - el.min) / (el.max - el.min) * 100;
  const color = el.id === 'speedSlider' ? 'var(--accent2)' : 'var(--accent)';
  el.style.background = `linear-gradient(to right, ${color} ${pct}%, var(--border) ${pct}%)`;
}

// Init loop state
loopToggle.classList.add('active');
video.loop = false; // managed manually for AB support
setSpeed(1);
</script>
</body>
</html>
